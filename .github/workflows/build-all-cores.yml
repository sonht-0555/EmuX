name: Build All Cores

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.core.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EMSDK_VER: 3.1.46
      OPT_FLAGS: "-Oz -ffast-math -flto -DNDEBUG -ffunction-sections -fdata-sections"
      EXPORTED_METHODS: '["addFunction","FS","stringToUTF8","UTF8ToString","ccall","cwrap","getValue","setValue"]'
      EXPORTED_FUNCS: '["_retro_init","_retro_run","_retro_load_game","_retro_get_system_av_info","_retro_set_environment","_retro_set_video_refresh","_retro_set_audio_sample","_retro_set_audio_sample_batch","_retro_set_input_poll","_retro_set_input_state","_malloc","_free","_retro_serialize_size","_retro_serialize","_retro_unserialize","_emux_is_dirty","_emux_render16","_emux_render32","_emux_audio_reset","_emux_audio_process","_emux_audio_get_buffer_l","_emux_audio_get_buffer_r","_emux_audio_set_core_rate"]'
    strategy:
      fail-fast: false
      matrix:
        core:
          - {id: nes,      repo: quicknes,          initial_mem: 128mb, stack: 4mb,  make: ""}
          - {id: snes,     repo: snes9x,            initial_mem: 256mb, stack: 8mb,  make: "-C libretro"}
          - {id: snes2010, repo: snes9x2010,        initial_mem: 128mb, stack: 4mb,  make: "-f Makefile.libretro"}
          - {id: gba,      repo: mgba,              initial_mem: 256mb, stack: 8mb,  make: "-f Makefile.libretro"}
          - {id: genesis,  repo: genesis_plus_gx,   initial_mem: 256mb, stack: 8mb,  make: "-f Makefile.libretro"}
          - {id: ngp,      repo: mednafen_ngp,      initial_mem: 128mb, stack: 4mb,  make: ""}
          - {id: pce,      repo: mednafen_pce_fast, initial_mem: 128mb, stack: 4mb,  make: "-f Makefile"}
          - {id: a26,      repo: stella2014,        initial_mem: 64mb,  stack: 2mb,  make: "-f Makefile"}
          - {id: wswan,    repo: mednafen_wswan,    initial_mem: 128mb, stack: 4mb,  make: "-f Makefile"}
          - {id: lynx,     repo: handy,             initial_mem: 128mb, stack: 4mb,  make: "-f Makefile"}
          - {id: nds,      repo: melonds,           initial_mem: 512mb, stack: 32mb, make: ""}
          - {id: mame078,  repo: mame2003_plus,     initial_mem: 256mb, stack: 8mb,  make: ""}
          - {id: pokemini, repo: pokemini,          initial_mem: 128mb, stack: 2mb,  make: "", glue: "retro_pokemini.c", zlib: 1}
          - {id: arcade,   repo: fbneo,             initial_mem: 256mb, stack: 8mb,  make: "", subdir: "src/burner/libretro", glue: "retro_neogeo.c", zlib: 1}
          - {id: ps1,      repo: pcsx_rearmed,      initial_mem: 512mb, stack: 16mb, make: "-f Makefile.libretro DYNAREC=\"\" GPU_PEOPS=1 GLES=1", zlib: 1}
          - {id: nds2021,  repo: melonds2021,       initial_mem: 512mb, stack: 32mb, make: "", fetch: "git clone --depth 1 --branch before-rebase-20210922 https://github.com/libretro/melonDS.git libretro-super/libretro-melonds2021", patch: "sed -i \"s/-Wl,--no-undefined//g\" Makefile; sed -i \"s/-Wl,--version-script=[^ ]*//g\" Makefile"}
    steps:
      - uses: actions/checkout@v4
        with:
          path: emux

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VER }}
          actions-cache-folder: 'emsdk-cache'

      - name: Cache Emscripten Ports
        uses: actions/cache@v4
        with:
          path: ~/.emscripten_cache
          key: emscripten-cache-${{ env.EMSDK_VER }}-${{ matrix.core.zlib }}

      - name: Fetch
        run: |
          git clone --depth 1 https://github.com/libretro/libretro-super.git
          ${{ matrix.core.fetch || format('cd libretro-super && ./libretro-fetch.sh {0}', matrix.core.repo) }}

      - name: Pre-build Ports
        run: ${{ matrix.core.zlib && 'embuilder build zlib' || 'true' }}

      - name: Build
        run: |
          Z_FLAGS="${{ matrix.core.zlib && '-s USE_ZLIB=1 -DHAVE_ZLIB=1' || '' }}"

          echo "::group::Build Core"
          export CFLAGS="$OPT_FLAGS $Z_FLAGS"
          export CXXFLAGS="$OPT_FLAGS $Z_FLAGS"
          export LDFLAGS="$OPT_FLAGS -Wl,--gc-sections ${{ matrix.core.zlib && '-s USE_ZLIB=1' || '' }}"
          export LTO="-flto" fPIC="" SHARED=""
          CORE="$GITHUB_WORKSPACE/libretro-super/libretro-${{ matrix.core.repo }}"
          cd $CORE
          if [ -n "${{ matrix.core.subdir }}" ]; then cd ${{ matrix.core.subdir }}; fi
          ${{ matrix.core.patch || 'true' }}
          emmake make ${{ matrix.core.make }} platform=emscripten STATIC_LINKING=0 WANT_ZLIB=1 WANT_VFS=1 -j$(nproc)
          EMUX="$GITHUB_WORKSPACE/emux/.github/workflows/retro"
          emcc -c $EMUX/retro_utils.c -o $GITHUB_WORKSPACE/retro_utils.o $OPT_FLAGS -flto
          GLUE_NAME="${{ matrix.core.glue || 'retro_glue.c' }}"
          emcc -c $EMUX/$GLUE_NAME -o $GITHUB_WORKSPACE/retro_glue.o $OPT_FLAGS -flto $Z_FLAGS
          echo "::endgroup::"

          echo "::group::Analyze Symbols"
          find $CORE -name "*.o" -not -path "*/test*" -not -path "*/example*" > $GITHUB_WORKSPACE/objs.txt
          cat $GITHUB_WORKSPACE/objs.txt | xargs emnm 2>/dev/null | grep " U " | awk '{print $NF}' | sort -u > $GITHUB_WORKSPACE/syms.txt
          grep -hE "^(WEAK|W|EMSCRIPTEN_KEEPALIVE)" $EMUX/retro_utils.c $EMUX/$GLUE_NAME | cut -d'(' -f1 | awk '{print $NF}' | tr -d '*' | while read -r f; do
            grep -qiE "^_?${f}$" $GITHUB_WORKSPACE/syms.txt && echo "[USED] $f"
          done | sort -u
          echo "::endgroup::"

          echo "::group::Link WebAssembly"
          emcc @$GITHUB_WORKSPACE/objs.txt $GITHUB_WORKSPACE/retro_glue.o $GITHUB_WORKSPACE/retro_utils.o $OPT_FLAGS -flto \
            -s WASM=1 $Z_FLAGS -s ENVIRONMENT=web -s MALLOC=emmalloc \
            -s ALLOW_MEMORY_GROWTH=1 -s WASM_BIGINT=1 --no-heap-copy -s ALLOW_TABLE_GROWTH=1 \
            -s INITIAL_MEMORY=${{ matrix.core.initial_mem }} -s STACK_SIZE=${{ matrix.core.stack }} -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS="$EXPORTED_METHODS" \
            -s EXPORTED_FUNCTIONS="$EXPORTED_FUNCS" \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 -s ASSERTIONS=0 -s TEXTDECODER=2 -Wno-error=undefined \
            -s SUPPORT_LONGJMP=1 --strip-all --strip-debug \
            -o ${{ matrix.core.id }}.js
          zip -j ${{ matrix.core.id }}.zip ${{ matrix.core.id }}.js ${{ matrix.core.id }}.wasm
          mv ${{ matrix.core.id }}.zip $GITHUB_WORKSPACE/
          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.core.id }}-core
          path: ${{ matrix.core.id }}.zip

  deploy-static:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: cores
          merge-multiple: true

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: cores
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: false