<!DOCTYPE html>
<html>
    <body>
        <input type="file" id="f">
        <button id="b">Dịch</button>
        <div id="res">Kết quả sẽ ở đây...</div>

        <script>
            const key = "";

            b.onclick = async () => {
                const file = f.files[0]; if (!file) return;
                res.innerText = "Đang xử lý...";

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result.split(',')[1];
                    try {
                        const r = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`, {
                            method: "POST",
                            headers: {"Content-Type": "application/json"},
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        {text: "Dịch sang tiếng Việt, chỉ trả về kết quả."},
                                        {inline_data: {mime_type: "image/jpeg", data: base64}}
                                    ]
                                }]
                            })
                        });
                        const d = await r.json();
                        res.innerText = d.candidates[0].content.parts[0].text;
                    } catch (err) {res.innerText = "Lỗi: " + err.message;}
                };
                reader.readAsDataURL(file);
            };
        </script>
    </body>
</html>
