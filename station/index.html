<!DOCTYPE html>
<html>
    <head>
        <title>PICO-8</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <style>
            body {
                background-color: #222;
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                color: #ccc;
                font-family: monospace;
                overflow: hidden;
                user-select: none;
                -webkit-touch-callout: none;
            }

            canvas {
                display: none;
                width: 320px;
                height: 320px;
                image-rendering: pixelated;
                background: #000;
                margin-bottom: 20px;
            }

            @media (min-width: 600px) {
                canvas {
                    width: 480px;
                    height: 480px;
                }
            }

            #ui_layer {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .picker_btn {
                background-color: #444;
                color: #eee;
                padding: 15px 30px;
                font-weight: bold;
                border-radius: 4px;
                cursor: pointer;
                border: 1px solid #666;
            }

            #controls {
                display: none;
                width: 100%;
                max-width: 420px;
                justify-content: space-between;
                align-items: center;
                margin-top: 30px;
                padding: 0 20px;
                box-sizing: border-box;
            }

            .btn {
                width: 44px;
                height: 44px;
                background: #333;
                color: #ccc;
                border: 1px solid #555;
                border-radius: 2px;
                font-size: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                touch-action: none;
                user-select: none;
            }

            .btn:active {
                background: #555;
                color: #fff;
            }

            .dpad {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 5px;
            }

            .action_buttons {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
        </style>
    </head>
    <body>
        <div id="ui_layer">
            <label for="file_picker" class="picker_btn" id="picker_label">Pico8.JS</label>
            <input type="file" id="file_picker" style="display:none" onchange="handle_file(this.files)">
        </div>
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        <div id="controls">
            <!-- D-PAD -->
            <div class="dpad">
                <div style="grid-column: 2"><button class="btn" onpointerdown="p(4)" onpointerup="r(4)" onpointerleave="r(4)">⬆</button></div>
                <div style="grid-row: 2"><button class="btn" onpointerdown="p(1)" onpointerup="r(1)" onpointerleave="r(1)">⬅</button></div>
                <div style="grid-row: 2; grid-column: 3"><button class="btn" onpointerdown="p(2)" onpointerup="r(2)" onpointerleave="r(2)">➡</button></div>
                <div style="grid-row: 3; grid-column: 2"><button class="btn" onpointerdown="p(8)" onpointerup="r(8)" onpointerleave="r(8)">⬇</button></div>
            </div>
            <!-- ACTION BUTTONS -->
            <div class="action_buttons">
                <button id="sound_btn" class="btn" onclick="toggle_sound()">I</button>
                <button id="pause_btn" class="btn" onclick="toggle_pause()">II</button>
                <button class="btn" onpointerdown="p(16)" onpointerup="r(16)" onpointerleave="r(16)">O</button>
                <button class="btn" onpointerdown="p(32)" onpointerup="r(32)" onpointerleave="r(32)">X</button>
            </div>
        </div>
        <script type="text/javascript">
            var pico8_state = [];
            var pico8_buttons = [0, 0, 0, 0, 0, 0, 0, 0];
            var pico8_gpio = new Array(128);
            var Module = {
                canvas: document.getElementById("canvas")
            };
            // Button Functions
            function p(bit) {pico8_buttons[0] |= bit;}
            function r(bit) {pico8_buttons[0] &= ~bit;}
            function toggle_pause() {pico8_buttons[0] |= 0x40; setTimeout(() => {pico8_buttons[0] &= ~0x40;}, 100);}
            function toggle_sound() {
                if (Module.pico8ToggleSound) {
                    Module.pico8ToggleSound();
                    let btn = document.getElementById("sound_btn");
                    let vol = (typeof pico8_state.sound_volume !== 'undefined') ? pico8_state.sound_volume : 1;
                }
            }
            function handle_file(files) {
                if (files.length === 0) return;
                var file = files[0];

                // Hide menu and show game
                document.getElementById("ui_layer").style.display = "none";
                document.getElementById("canvas").style.display = "block";
                document.getElementById("controls").style.display = "flex";
                document.getElementById("pause_btn").style.display = "flex";

                // Load selected file as a script
                var e = document.createElement("script");
                e.src = URL.createObjectURL(file);
                document.body.appendChild(e);
            }
        </script>
    </body>
</html>
