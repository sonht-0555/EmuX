<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>MAME 0.78 Test</title>
        <style>
            body {
                background: #111;
                color: #eee;
                text-align: center;
                font-family: sans-serif;
                margin: 40px
            }

            canvas {
                background: #000;
                max-width: 100%;
                image-rendering: pixelated;
                border: 2px solid #333
            }

            #status {
                margin: 20px;
                font-family: monospace
            }

            label {
                background: #4caf50;
                color: #fff;
                padding: 10px 20px;
                border-radius: 6px;
                cursor: pointer
            }

            input[type=file] {
                display: none
            }
        </style>
    </head>
    <body>
        <h1>MAME 0.78 Test</h1>
        <div id="status">Chọn ROM...</div>
        <canvas id="canvas"></canvas><br><br>
        <input type="file" id="rom" accept=".zip">
        <label for="rom">Chọn ROM (.zip)</label>

        <script src="../../src/utils/zip.js"></script>
        <script>
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', {alpha: false});
            let imageData = null;

            function video_cb(data, w, h, pitch) {
                if (!data) return;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w; canvas.height = h;
                    imageData = ctx.createImageData(w, h);
                }
                const dst = new Uint32Array(imageData.data.buffer);
                const heap8 = Module.HEAPU8;
                for (let y = 0; y < h; y++) {
                    const rowAddr = data + y * pitch;
                    const dstOff = y * w;
                    for (let x = 0; x < w; x++) {
                        const c = heap8[rowAddr + (x << 1)] | (heap8[rowAddr + (x << 1) + 1] << 8);
                        const r5 = (c >> 11) & 0x1f, g6 = (c >> 5) & 0x3f, b5 = (c & 0x1f);
                        const r = (r5 << 3) | (r5 >> 2), g = (g6 << 2) | (g6 >> 4), b = (b5 << 3) | (b5 >> 2);
                        dst[dstOff + x] = 0xFF000000 | (b << 16) | (g << 8) | r;
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            }

            document.getElementById('rom').onchange = async (e) => {
                const file = e.target.files[0];
                document.getElementById('status').textContent = 'Đang tải core...';

                const zip = fflate.unzipSync(new Uint8Array(await (await fetch('./mame078.zip')).arrayBuffer()));
                const js = Object.keys(zip).find(n => n.endsWith('.js'));
                const wasm = Object.keys(zip).find(n => n.endsWith('.wasm'));
                const romData = new Uint8Array(await file.arrayBuffer());

                window.wasmUrl = URL.createObjectURL(new Blob([zip[wasm]], {type: 'application/wasm'}));

                window.Module = {
                    canvas,
                    locateFile: (p) => p.endsWith('.wasm') ? window.wasmUrl : p,
                    onRuntimeInitialized: () => {
                        const getPtr = (s) => {const p = Module._malloc(s.length + 1); Module.stringToUTF8(s, p, s.length + 1); return p;};
                        const logFn = Module.addFunction(() => 0, "viii");

                        Module._retro_set_environment(Module.addFunction((cmd, data) => {
                            const d = data >> 2;
                            switch (cmd) {
                                case 1: { // SET_PIXEL_FORMAT
                                    Module.pixelFormat = Module.HEAP32[d]; return 1;
                                }
                                case 27: { // SET_MESSAGE_EXT
                                    Module.HEAP32[d] = logFn; return 1;
                                }
                                case 9: // GET_SYSTEM_DIRECTORY
                                case 10: // GET_SAVE_DIRECTORY
                                case 31: { // GET_CORE_ASSETS_DIRECTORY
                                    Module.HEAP32[d] = getPtr("/"); return 1;
                                }
                                case 15: { // GET_VARIABLE
                                    const key = Module.UTF8ToString(Module.HEAP32[d]);
                                    let val = "";
                                    if (key.includes('skip_disclaimer') || key.includes('skip_warnings')) val = "enabled";
                                    else if (key.includes('sample_rate')) val = "48000";
                                    else if (key.includes('mouse_enable')) val = "enabled";
                                    else if (key.includes('video_depth')) val = "16";
                                    else if (key.includes('neogeo_bios')) val = "default";
                                    else if (key.includes('display_artwork')) val = "enabled";
                                    else if (key.includes('brightness')) val = "1.0";
                                    else if (key.includes('gamma')) val = "1.0";

                                    if (val) {
                                        Module.HEAP32[d + 1] = getPtr(val);
                                        return 1;
                                    }
                                    return 0;
                                }
                                case 21: // SET_MESSAGE
                                    return 1;
                                case 3: // GET_CAN_DUPE
                                    if (data) Module.HEAP8[data] = 1;
                                    return 1;
                                case 14: // SET_GEOMETRY
                                    return 1;
                                default:
                                    return 0;
                            };
                        }, "iii"));

                        Module._retro_set_video_refresh(Module.addFunction(video_cb, "viiii"));
                        Module._retro_set_audio_sample(Module.addFunction((l, r) => { }, "vii"));
                        Module._retro_set_audio_sample_batch(Module.addFunction((d, f) => f, "iii"));
                        Module._retro_set_input_poll(Module.addFunction(() => { }, "v"));
                        Module._retro_set_input_state(Module.addFunction((p, d, i, id) => 0, "iiiii"));

                        Module._retro_init();

                        const romPath = '/' + file.name;
                        Module.FS.writeFile(romPath, romData);

                        const info = Module._malloc(16);
                        Module.HEAPU32[info >> 2] = getPtr(romPath);
                        Module.HEAPU32[(info >> 2) + 1] = 0;
                        Module.HEAPU32[(info >> 2) + 2] = 0;
                        Module.HEAPU32[(info >> 2) + 3] = 0;

                        if (Module._retro_load_game(info)) {
                            document.getElementById('status').textContent = 'Đang chạy: ' + file.name;
                            const loop = () => {Module._retro_run(); requestAnimationFrame(loop);};
                            loop();
                        } else {
                            document.getElementById('status').textContent = 'Lỗi nạp game';
                        }
                    }
                };

                const s = document.createElement('script');
                s.src = URL.createObjectURL(new Blob([zip[js]], {type: 'application/javascript'}));
                document.body.appendChild(s);
            };
        </script>
    </body>
</html>
