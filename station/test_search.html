<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EmuX ROM Search Station</title>
        <style>
            :root {
                --bg: #0f0f0f;
                --surface: #1a1a1a;
                --accent: #007aff;
                --text: #ffffff;
                --text-dim: #888;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                padding: 20px;
                max-width: 600px;
                margin: 0 auto;
            }

            h2 {
                font-weight: 300;
                letter-spacing: 1px;
            }

            .search-box {
                position: sticky;
                top: 20px;
                background: var(--bg);
                padding-bottom: 10px;
                z-index: 10;
            }

            input {
                width: 100%;
                padding: 15px;
                background: var(--surface);
                border: 1px solid #333;
                color: white;
                border-radius: 12px;
                box-sizing: border-box;
                outline: none;
                font-size: 16px;
                transition: border-color 0.3s;
            }

            input:focus {
                border-color: var(--accent);
            }

            #results {
                margin-top: 10px;
                list-style: none;
                padding: 0;
            }

            li {
                padding: 15px;
                background: var(--surface);
                margin-bottom: 8px;
                border-radius: 10px;
                cursor: pointer;
                display: flex;
                flex-direction: column;
                transition: transform 0.2s;
            }

            li:active {
                transform: scale(0.98);
            }

            .name {
                font-weight: 500;
                font-size: 14px;
            }

            .path {
                color: var(--text-dim);
                font-size: 11px;
                margin-top: 4px;
                word-break: break-all;
            }

            .status {
                color: var(--text-dim);
                font-size: 12px;
                margin-bottom: 10px;
            }
        </style>
    </head>
    <body>
        <h2>ROM Station</h2>
        <div class="status" id="status">Đang tải danh sách từ GitHub...</div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm tên game..." oninput="searchGame()">
        </div>

        <ul id="results"></ul>

        <script>
            let romsList = [];
            const statusEl = document.getElementById('status');
            const resultsUl = document.getElementById('results');

            async function fetchRoms() {
                try {
                    // Gọi API lấy toàn bộ cây thư mục (recursive)
                    const response = await fetch('https://api.github.com/repos/AlexBlackmore/roms/git/trees/master?recursive=1');
                    if (!response.ok) throw new Error("GitHub API Limit or Network Error");

                    const data = await response.json();

                    // Lọc lấy các file giả lập phổ biến
                    romsList = data.tree.filter(item =>
                        item.type === 'blob' &&
                        /\.(gb|gba|gbc|nes|zip|sfc|smc|nds|bin)$/i.test(item.path)
                    );

                    statusEl.textContent = `Sẵn sàng: ${romsList.length} ROMs được tìm thấy.`;
                } catch (error) {
                    statusEl.textContent = "Lỗi: " + error.message;
                    statusEl.style.color = "#ff453a";
                }
            }

            function searchGame() {
                const query = document.getElementById('searchInput').value.toLowerCase().trim();
                resultsUl.innerHTML = '';

                if (query.length < 2) return;

                // Tìm kiếm dựa trên tên file hoặc đường dẫn
                const matches = romsList.filter(rom =>
                    rom.path.toLowerCase().includes(query)
                ).slice(0, 50); // Hiện 50 kết quả

                matches.forEach(rom => {
                    const li = document.createElement('li');
                    const parts = rom.path.split('/');
                    const fileName = parts[parts.length - 1];

                    li.innerHTML = `
                    <span class="name">${fileName}</span>
                    <span class="path">${rom.path}</span>
                `;

                    li.onclick = () => {
                        const rawUrl = `https://raw.githubusercontent.com/AlexBlackmore/roms/master/${rom.path}`;
                        console.log("Downloading from:", rawUrl);
                        window.open(rawUrl, '_blank');
                    };
                    resultsUl.appendChild(li);
                });
            }

            fetchRoms();
        </script>
    </body>
</html>
